services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: financial_rag
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./financial_rag.dump:/docker-entrypoint-initdb.d/financial_rag.dump
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  pipeline:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/financial_rag
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./pipeline.log:/app/pipeline.log

volumes:
  pgdata:
