services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: financial_rag
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./financial_rag.dump:/docker-entrypoint-initdb.d/financial_rag.dump
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres -d financial_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  # pipeline:
  #   build: .
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@db:5432/financial_rag
  #   env_file:
  #     - .env
  #   volumes:
  #     - ./data:/app/data
  #     - ./pipeline.log:/app/pipeline.log

  retrieval:
    build: ./retrieval
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: financial_rag
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_CONNECT_RETRIES: 20
      DB_CONNECT_RETRY_DELAY: 2.0
      # LLM (HPC SGLang endpoint, backend-only — read from repo-root .env)
      SGLANG_BASE_URL: ${SGLANG_BASE_URL:-}
      SGLANG_MODEL: ${SGLANG_MODEL:-Qwen/Qwen3.5-397B-A17B-FP8}
      SGLANG_API_KEY: ${SGLANG_API_KEY:-}
      SGLANG_MAX_TOKENS: ${SGLANG_MAX_TOKENS:-32768}
      # Public /chat endpoint auth (empty = disabled)
      API_KEY: ${API_KEY:-}
      # CORS allow-list for frontend (wide-open for dev)
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  pgdata:
